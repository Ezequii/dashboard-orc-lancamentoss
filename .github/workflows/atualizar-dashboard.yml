name: Atualizar dados do dashboard

on:
  push:
    branches: [main]
    paths:
      - 'atualizar_dados/CONTROLE_DE_REQUISICOES_2026.xlsx'
      - 'scripts/atualizar_dados.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o repositorio
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar leitor de Excel
        run: pip install openpyxl==3.1.5

      - name: Validar planilha e gerar JSON
        run: python scripts/atualizar_dados.py

      - name: Validar o build do dashboard
        run: |
          npm ci
          npm run build

      - name: Salvar dados atualizados no GitHub
        run: |
          if git diff --quiet -- src/data/orcamentos.json src/data/meta.json; then
            echo 'Nenhuma alteracao de dados foi detectada.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/data/orcamentos.json src/data/meta.json
          git commit -m 'Atualiza dados do dashboard [skip ci]'
          git push
